# Development overrides for docker-compose.yml
version: '3.8'

services:
  parking-angel:
    build:
      target: deps  # Use deps stage for development
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
